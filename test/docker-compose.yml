services:
  elasticsearch:
    image: elasticsearch:9.3.2
    container_name: elasticsearch
    restart: always
    user: "1000:1000"
    volumes:
    - ./elastic_data:/usr/share/elasticsearch/data
    - ./certs/server.crt:/usr/share/elasticsearch/config/certs/server.crt:ro
    - ./certs/server.key:/usr/share/elasticsearch/config/certs/server.key:ro
    - ./certs/ca.crt:/usr/share/elasticsearch/config/certs/ca.crt:ro
    - ./certs/service_tokens:/usr/share/elasticsearch/config/service_tokens:ro
    env_file:
      - .env
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: true
      xpack.security.http.ssl.enabled: true
      xpack.security.http.ssl.certificate: "certs/server.crt"
      xpack.security.http.ssl.key: "certs/server.key"
      xpack.security.http.ssl.certificate_authorities: "certs/ca.crt"
      xpack.security.enrollment.enabled: true
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
    - '9200:9200'
    networks:
      - elk

  logstash:
    image: logstash:9.3.2
    container_name: logstash
    restart: always
    volumes:
      - ./config/:/usr/share/logstash/logstash_dir:ro
      - ./certs/ca.crt:/usr/share/logstash/config/certs/ca.crt:ro
    command: logstash -f /usr/share/logstash/logstash_dir/logstash.conf
    depends_on:
      - elasticsearch
    ports:
    - '5000:5000'
    env_file:
      - .env
    environment:
      ELASTIC_USER: ${ELASTIC_USER}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"    
    networks:
      - elk

  kibana:
    image: kibana:9.3.2
    container_name: kibana
    restart: always       
    volumes:
      - ./certs/ca.crt:/usr/share/kibana/config/certs/ca.crt:ro
      - ./certs/server.crt:/usr/share/kibana/config/certs/server.crt:ro
      - ./certs/server.key:/usr/share/kibana/config/certs/server.key:ro
    env_file:
      - .env
    environment:
      ELASTICSEARCH_HOSTS: "https://elasticsearch:9200"
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: "/usr/share/kibana/config/certs/ca.crt"
      SERVER_SSL_ENABLED: true
      SERVER_SSL_CERTIFICATE: "/usr/share/kibana/config/certs/server.crt"
      SERVER_SSL_KEY: "/usr/share/kibana/config/certs/server.key"
    ports:
      - '5601:5601'
    depends_on:
      - elasticsearch  
    networks:
      - elk

networks:
  elk:

