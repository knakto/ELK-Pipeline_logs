version: '3.6'
services:
  elasticsearch:
    image: elasticsearch:9.3.2
    container_name: elasticsearch
    restart: always
    volumes:
    - ./elasticsearch/elastic_data:/usr/share/elasticsearch/data
    - ./elasticsearch/http.p12:/usr/share/elasticsearch/config/http.p12
    - ./elasticsearch/service_tokens:/usr/share/elasticsearch/config/service_tokens
    env_file:
      - .env
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: true
      xpack.security.http.ssl.enabled: true
      xpack.security.http.ssl.keystore.path: "http.p12"
      xpack.security.enrollment.enabled: true
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
    - '9200:9200'
    networks:
      - elk

  logstash:
    image: logstash:9.3.2
    container_name: logstash
    restart: always
    volumes:
    - ./logstash/:/usr/share/logstash/logstash_dir
    - ./kibana/elasticsearch-ca.pem:/usr/share/logstash/config/certs/elasticsearch-ca.pem
    command: logstash -f /usr/share/logstash/logstash_dir/logstash.conf
    depends_on:
      - elasticsearch
    ports:
    - '5000:5000'
    env_file:
      - .env
    environment:
      ELASTIC_USER: ${ELASTIC_USER}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD}
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"    
    networks:
      - elk

  kibana:
    image: kibana:9.3.2
    container_name: kibana
    restart: always       
    volumes:
      - ./kibana/elasticsearch-ca.pem:/usr/share/kibana/config/elasticsearch-ca.pem
      - ./elasticsearch/http.p12:/usr/share/kibana/config/certs/http.p12
    env_file:
      - .env
    environment:
      ELASTICSEARCH_HOSTS: "https://elasticsearch:9200"
      ELASTICSEARCH_SSL_CERTIFICATEAUTHORITIES: "/usr/share/kibana/config/elasticsearch-ca.pem"
      SERVER_SSL_ENABLED: true
      SERVER_SSL_KEYSTORE_PATH: "/usr/share/kibana/config/certs/http.p12"
    ports:
      - '5601:5601'
    depends_on:
      - elasticsearch  
    networks:
      - elk

networks:
  elk:

