version: '3.6'
services:
  elasticsearch:
    image: elasticsearch:9.3.2
    container_name: elasticsearch
    restart: always
    volumes:
    - ./elastic_data:/usr/share/elasticsearch/data
    environment:
      discovery.type: "single-node"
      xpack.security.enabled: false
      xpack.security.enrollment.enabled: false
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
    - '9200:9200'
    - '9300:9300'
    expose:
    - 9200
    networks:
      - elk

  logstash:
    image: logstash:9.3.2
    container_name: logstash
    restart: always
    volumes:
    - ./logstash/:/usr/share/logstash/logstash_dir
    - ./temp:/usr/share/logstash/temp
    command: logstash -f /usr/share/logstash/logstash_dir/logstash.conf
    depends_on:
      - elasticsearch
    ports:
    - '9600:9600'
    environment:
      LS_JAVA_OPTS: "-Xmx256m -Xms256m"    
    networks:
      - elk

  kibana:
    image: kibana:9.3.2
    container_name: kibana
    restart: always       
    ports:
    - '5601:5601'
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    depends_on:
      - elasticsearch  
    networks:
      - elk

networks:
  elk:

